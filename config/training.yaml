classification:
  model: TabularTransformer
  default_params:
    d_model: 64
    nhead: 4
    num_layers: 2
    dim_feedforward: 128
    dropout: 0.1
  training:
    epochs: 30
    batch_size: 512
    learning_rate: 0.001
    weight_decay: 0.0001
  optuna:
    n_trials: 5
    d_model_choices: [64, 128]
    nhead_choices: [2, 4]
    num_layers_range: [2, 4]
    lr_range: [0.0001, 0.01]
    dropout_range: [0.05, 0.3]

timeseries:
  model: FraudLSTM
  default_params:
    hidden_size: 64
    num_layers: 2
    dropout: 0.2
    window_size: 32
  training:
    epochs: 20
    batch_size: 256
    learning_rate: 0.001

anomaly:
  model: IsolationForest
  default_params:
    contamination: 0.002
    n_estimators: 200
    random_state: 42

data_split:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  method: chronological

evaluation_gate:
  classification:
    metric: f1
    tolerance: 0.01
  timeseries:
    metric: f1
    tolerance: 0.01
  anomaly:
    auto_promote: false

mlflow:
  registry_names:
    classification: fraud-classifier
    timeseries: fraud-lstm
    anomaly: fraud-anomaly

monitoring:
  drift:
    schedule_seconds: 3600
    n_recent: 5000
    psi_threshold: 0.2
    ks_pvalue_threshold: 0.05
  performance:
    update_seconds: 60
    windows: [100, 1000, 10000]
  alerts:
    drift_psi_warning: 0.1
    drift_psi_critical: 0.25
    accuracy_min: 0.9
    f1_min: 0.5

alerting:
  slack_webhook_url: ""
  smtp_host: ""
  smtp_port: 587
  smtp_user: ""
  smtp_pass: ""
  alert_email_to: ""
  severity_routing:
    critical: [slack, email]
    warning: [slack]
    info: [log]

retraining:
  consecutive_drift_required: 2
  accuracy_drop_threshold: 0.05
  stale_model_days: 7
  auto_rollback:
    window_seconds: 1800
    accuracy_drop: 0.03
    latency_p99: 2.0
