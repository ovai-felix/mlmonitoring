apiVersion: 1

contactPoints:
  - orgId: 1
    name: slack
    receivers:
      - uid: slack-receiver
        type: slack
        settings:
          url: ${SLACK_WEBHOOK_URL}
          title: |
            {{ template "default.title" . }}
          text: |
            {{ template "default.message" . }}

  - orgId: 1
    name: email
    receivers:
      - uid: email-receiver
        type: email
        settings:
          addresses: ${ALERT_EMAIL_TO}
          singleEmail: true

  - orgId: 1
    name: slack_email
    receivers:
      - uid: slack-email-slack
        type: slack
        settings:
          url: ${SLACK_WEBHOOK_URL}
          title: |
            {{ template "default.title" . }}
          text: |
            {{ template "default.message" . }}
      - uid: slack-email-email
        type: email
        settings:
          addresses: ${ALERT_EMAIL_TO}
          singleEmail: true
