apiVersion: 1

policies:
  - orgId: 1
    receiver: slack
    group_by:
      - alertname
      - severity
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: slack_email
        matchers:
          - channel = slack_email
        continue: false
      - receiver: slack
        matchers:
          - channel = slack
        continue: false
      - receiver: email
        matchers:
          - channel = email
        continue: false
