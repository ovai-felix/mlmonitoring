global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "model-server"
    scrape_interval: 15s
    static_configs:
      - targets: ["model-server:8000"]

  - job_name: "drift-detector"
    scrape_interval: 60s
    static_configs:
      - targets: ["drift-detector:8001"]
